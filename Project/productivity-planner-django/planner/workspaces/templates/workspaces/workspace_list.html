{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Workspaces</h2>
  <a href="{% url 'workspace_create' %}" class="btn btn-primary">+ New workspace</a>
</div>
<div class="row g-3">
  {% for w in workspaces %}
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5><a href="{% url 'workspace_detail' w.pk %}" class="text-decoration-none">{{ w.name }}</a></h5>
          <p class="text-muted small">{{ w.description|truncatechars:80 }}</p>
          <p class="mb-0"><span class="badge bg-secondary">{{ w.tasks.count }} task{{ w.tasks.count|pluralize }}</span></p>
        </div>
      </div>
    </div>
  {% empty %}
    <p class="text-muted">No workspaces yet.</p>
  {% endfor %}
</div>
{% endblock %}
